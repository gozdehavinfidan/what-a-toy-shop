name: Deploy to GitHub Pages

# Build & publish the static site whenever main changes (or run it manually).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is plain static files served from the repo root.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
